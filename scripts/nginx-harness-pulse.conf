# Nginx config snippet for Harness Pulse
# Add this server block to your nginx config, or include it from /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name harnesspulse.mrb.sh;

    root /var/www/harness-pulse;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        add_header Content-Type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    location /feed.xml {
        add_header Content-Type application/rss+xml;
    }

    # Cache static assets
    location ~* \.(css|js|svg|png|ico)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # No cache for index and JSON
    location ~* \.(html|json|xml)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
